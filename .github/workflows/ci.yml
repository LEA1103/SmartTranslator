name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/Release/smart-translator.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y qtbase5-dev cmake
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: build/smart-translator

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装指定版本的 Qt（避开 brew 不稳定问题）
      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: mac
          target: desktop

      # 2. 强制指定 Qt 安装路径，确保 arm64 链接正确
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_PREFIX_PATH=${{ env.Qt5_DIR }}

      - name: Build
        run: cmake --build build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-bin
          path: build/smart-translator

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-exe/*
            linux-bin/*
            macos-bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
