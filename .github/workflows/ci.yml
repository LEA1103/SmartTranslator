name: C++ CI Build & Check

on:
  push:
    branches: [ main ] # 替换为你的主分支名
  pull_request:
    branches: [ main ]

jobs:
  # --------------------------
  # 1. 多平台构建 (Windows/macOS/Linux)
  # --------------------------
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false # 失败不取消其他任务，方便看全平台结果

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 已升级到 v4

      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake

      - name: Configure CMake
        # 你的根目录有 CMakeLists.txt，所以直接在当前目录构建
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4 # 已升级到 v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: build/ # 上传构建产物目录

  # --------------------------
  # 2. 代码格式检查 (clang-format)
  # 利用根目录的 .clang-format 配置
  # --------------------------
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Run clang-format
        # 检查 src/ 和 include/ 下所有 .h/.cpp 文件
        run: |
          find src/ include/ -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

  # --------------------------
  # 3. 静态代码分析 (clang-tidy / cppcheck)
  # 利用根目录的 .clang-tidy 和 .cppcheck 配置
  # --------------------------
  static-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Run clang-tidy
        run: |
          # 利用项目根目录的 .clang-tidy 配置
          find src/ include/ -name "*.cpp" | xargs clang-tidy -p build --

      - name: Run cppcheck
        run: cppcheck --enable=all src/ include/

  # --------------------------
  # 4. 生成文档 (Doxygen)
  # 利用 docs/ 目录下的 Doxyfile
  # --------------------------
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: Generate Docs
        # 进入 docs 目录执行 Doxyfile
        run: |
          cd docs
          doxygen Doxyfile

      - name: Upload Docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/html/
