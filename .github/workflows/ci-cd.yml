name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: "5.15.2"

jobs:
  # ==================== Windows 构建 ====================
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: 安装依赖
        run: |
          .\vcpkg\vcpkg install qt5:x64-windows
          .\vcpkg\vcpkg install tesseract:x64-windows
          .\vcpkg\vcpkg install curl:x64-windows
          .\vcpkg\vcpkg install yaml-cpp:x64-windows
          .\vcpkg\vcpkg install sqlite3:x64-windows
          .\vcpkg\vcpkg install gtest:x64-windows

      - name: 配置 CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: 编译
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: 运行测试
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/Release/smart-translator.exe
            build/config/
          retention-days: 7

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: build/Testing/

  # ==================== macOS 构建 ====================
  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装依赖
        run: |
          brew install qt@5
          brew install tesseract
          brew install curl
          brew install yaml-cpp
          brew install sqlite3
          brew install googletest

      - name: 安装 Tesseract 语言包
        run: brew install tesseract-lang

      - name: 配置环境
        run: |
          echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@5" >> $GITHUB_ENV

      - name: 配置 CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: 编译
        run: cmake --build build --parallel

      - name: 运行测试
        working-directory: build
        run: ctest --output-on-failure

      - name: 打包 .app
        run: |
          mkdir -p SmartTranslator.app/Contents/MacOS
          mkdir -p SmartTranslator.app/Contents/Resources
          cp build/bin/smart-translator SmartTranslator.app/Contents/MacOS/
          [ -d config ] && cp -r config/ SmartTranslator.app/Contents/Resources/ || true

      - name: 生成 DMG
        run: |
          hdiutil create -volname "Smart Translator" -srcfolder SmartTranslator.app -ov -format UDZO SmartTranslator.dmg

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            SmartTranslator.dmg
            build/bin/smart-translator
          retention-days: 7

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: build/Testing/

  # ==================== Linux 构建 ====================
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu-22.04, ubuntu-20.04]

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            qtbase5-dev \
            tesseract-ocr \
            libtesseract-dev \
            tesseract-ocr-eng \
            tesseract-ocr-chi-sim \
            libcurl4-openssl-dev \
            libyaml-cpp-dev \
            libsqlite3-dev \
            libgtest-dev \
            doxygen \
            graphviz \
            lcov

      - name: 配置 CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: 编译
        run: cmake --build build --parallel

      - name: 运行测试
        working-directory: build
        run: ctest --output-on-failure

      - name: 覆盖率测试并上传
        run: |
          cmake --build build --target coverage
          bash <(curl -s https://codecov.io/bash) -f build/coverage.info

      - name: 打包安装包
        run: |
          cmake --build build --target package

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ matrix.distro }}
          path: |
            build/bin/smart-translator
            build/*.deb
            build/*.tar.gz
          retention-days: 7

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results-${{ matrix.distro }}
          path: build/Testing/

  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装工具
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck

      - name: 运行 Clang-Tidy
        run: |
          cmake -B build
          cmake --build build --target tidy

      - name: 运行 Cppcheck
        run: |
          cppcheck --enable=all \
            --xml \
            --xml-version=2 \
            -I include \
            -j 4 \
            src/ 2> cppcheck-report.xml || true

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  # ==================== 生成文档 ====================
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: 生成文档
        run: |
          cmake -B build
          cmake --build build --target doc

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api/html

  # ==================== 发布版本 ====================
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/*
            macos-build/SmartTranslator.dmg
            linux-build-ubuntu-22.04/*.deb
            linux-build-ubuntu-22.04/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
