name: Build & Package Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python（用于 aqtinstall）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # 缓存 pip 依赖，加速构建

      # 3. 安装 aqtinstall 并下载 Qt 5.15.2（仅 Windows 平台）
      - name: Install Qt 5.15.2
        run: |
          # 安装 aqtinstall 工具
          pip install aqtinstall
          
          # 核心修复：正确的 Qt 安装命令（host=windows，版本放最后）
          # 架构说明：win64_msvc2019_64 适配 VS2019/2022（windows-latest 默认带）
          # 按需添加模块：qtbase(核心)、qttools(构建工具)、qt5compat(兼容层)、qtwidgets(UI)
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 ^
            --archives qtbase qttools qt5compat qtwidgets qtsvg ^
            --outputdir C:\Qt
        shell: cmd

      # 4. 配置 CMake 环境
      - name: Configure CMake
        run: |
          # 设置 Qt 路径（和上面 aqt 安装路径对应）
          set QT_DIR=C:\Qt\5.15.2\msvc2019_64
          
          # 创建构建目录并运行 CMake
          mkdir build
          cd build
          cmake .. ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_PREFIX_PATH=%QT_DIR% ^
            -DCMAKE_BUILD_TYPE=Release
        shell: cmd

      # 5. 编译项目（Release 版本）
      - name: Build project
        run: |
          cd build
          cmake --build . --config Release --parallel 4 # 4线程编译，加速
        shell: cmd

      # 6. 打包（复制 Qt 依赖库，生成可执行程序包）
      - name: Package executable
        run: |
          # 创建打包目录
          mkdir dist
          
          # 复制编译后的 exe 到打包目录
          copy build\Release\SmartTranslator.exe dist\
          
          # 使用 windeployqt 自动复制 Qt 依赖库
          C:\Qt\5.15.2\msvc2019_64\bin\windeployqt.exe ^
            --release ^
            --no-translations ^
            dist\SmartTranslator.exe
        shell: cmd

      # 7. 上传构建产物（可选，方便下载测试）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTranslator-Windows
          path: dist/
