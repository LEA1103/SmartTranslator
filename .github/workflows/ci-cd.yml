name: CI/CD Pipeline (Windows Only)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build & Package Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies (CMake, Qt5, NSIS)
        run: |
          choco install cmake qt5-default nsis --no-progress
          refreshenv

      - name: Configure CMake (Auto detect Qt path)
        run: |
          $qmakePath = (Get-Command qmake -ErrorAction Stop).Source
          $qtDir = Split-Path (Split-Path $qmakePath -Parent) -Parent
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$qtDir"

      - name: Build Project
        run: cmake --build build --config Release

      - name: Create Installer (EXE)
        run: makensis installer.nsi

      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  # 自动发布到 GitHub Releases (仅打标签 v* 时触发)
  release:
    name: Publish to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
