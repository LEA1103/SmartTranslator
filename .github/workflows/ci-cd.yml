name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Qt 5.15.2
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: msvc2019_64

      # 3. 配置 CMake
      - name: Configure CMake
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      # 4. 编译项目
      - name: Build project
        run: cmake --build build --config Release

      # 【关键】调试：列出 build 目录文件，确认 exe 生成路径
      - name: List build directory
        run: dir build\Release\

      # 【关键】上传 exe 产物
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: SmartTranslator-Windows
          path: build/Release/
          retention-days: 30 # 产物保存30天
