name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装Python（给Qt安装工具用）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装Qt 5.15.2
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      # CMake配置
      - name: Configure CMake
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      # 编译exe
      - name: Build project
        run: cmake --build build --config Release

      # ✅【关键修复】自动拷贝Qt所有依赖dll
      - name: Deploy Qt dependencies
        run: windeployqt build/Release/SmartTranslator.exe

      # 上传完整包（exe + dll）
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: SmartTranslator-Windows
          path: build/Release/
          retention-days: 30
