name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python 并强制设置路径（彻底解决权限问题）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          # 强制让系统使用我们安装的 Python，而非受限的 WindowsApps 目录
          PATH: ${{ steps.python.outputs.pythonLocation }};${{ env.PATH }}

      # 3. 安装 Qt 5.15.2（修正模块与架构，解决解析错误）
      - name: Install Qt
        uses: jurplel/install-qt-action@v3  # 降级到 v3，v4 对 Qt 5.x 兼容性不稳定
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          # 移除 modules 参数，安装默认的桌面基础模块，避免解析错误
          # 同时添加 --autodesktop 确保安装桌面开发必需组件
          extra: "--autodesktop"

      # 4. 配置 CMake
      - name: Configure CMake
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      # 5. 编译项目
      - name: Build project
        run: cmake --build build --config Release

      # 调试：列出 build 目录文件
      - name: List build directory
        run: dir build\Release\

      # 上传 exe 产物
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: SmartTranslator-Windows
          path: build/Release/
          retention-days: 30
