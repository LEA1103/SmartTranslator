build-windows:
  name: Build Windows
  runs-on: windows-latest
  steps:
    - uses: actions/checkout@v4

    # 安装依赖
    - name: 安装依赖
      run: |
        choco install cmake qt5-default nsis
        refreshenv  # 刷新环境变量，让系统识别新安装的工具

    # 关键：获取Qt安装路径并传递给CMake
    - name: 配置 CMake
      run: |
        # 找到qmake的位置，提取Qt根目录
        $qmakePath = (Get-Command qmake -ErrorAction Stop).Source
        $qtDir = Split-Path (Split-Path $qmakePath -Parent) -Parent
        Write-Host "Qt安装路径: $qtDir"
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$qtDir"

    # 编译项目
    - name: 编译
      run: cmake --build build --config Release

    # 打包exe安装包
    - name: 打包安装包
      run: makensis installer.nsi

    # 上传安装包
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: "*.exe"
