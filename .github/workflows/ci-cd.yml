name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  code-check:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y clang-format clang-tidy cppcheck qtbase5-dev

      - name: 检查代码格式
        run: clang-format --dry-run -Werror src/*.cpp include/*.h || true

      - name: Cppcheck 静态检查
        run: cppcheck src/ include/ --quiet

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y cmake g++ qtbase5-dev libtesseract-dev libyaml-cpp-dev libsqlite3-dev

      - name: 配置 CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译
        run: cmake --build build -j4

      - name: 打包 DEB
        run: |
          cd build
          cpack -G DEB

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/*.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: code-check
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install cmake qt@5 tesseract yaml-cpp sqlite3 pkg-config

      - name: 配置 CMake 【修复版】
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@5

      - name: 编译
        run: cmake --build build -j4

      - name: 打包 DMG
        run: |
          chmod +x package_macos.sh
          ./package_macos.sh

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: code-check
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          choco install cmake qt5-default nsis

      - name: 配置 CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译
        run: cmake --build build --config Release

      - name: 打包安装包
        run: |
          makensis installer.nsi

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有制品
        uses: actions/download-artifact@v4

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-deb/*.deb
            macos-dmg/*.dmg
            windows-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
