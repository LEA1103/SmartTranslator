name: CI/CD Pipeline (Windows Only)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build & Package Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装Python（用于稳定安装Qt）
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. 用aqtinstall稳定安装Qt 5.15.2（路径固定）
      - name: Install Qt 5.15.2
        run: |
          pip install aqtinstall
          aqt install-qt 5.15.2 windows desktop win64_msvc2019_64 --outputdir C:\Qt

      # 3. 安装CMake和NSIS
      - name: Install Build Tools
        run: |
          choco install cmake nsis --no-progress
          refreshenv

      # 4. 配置CMake（指定Qt路径和VS生成器）
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\Qt\5.15.2\msvc2019_64"

      # 5. 编译项目
      - name: Build Project
        run: cmake --build build --config Release

      # 6. 打包EXE安装包
      - name: Create Installer
        run: makensis installer.nsi

      # 7. 上传安装包
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  # 打标签时自动发布Release
  release:
    name: Publish to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
