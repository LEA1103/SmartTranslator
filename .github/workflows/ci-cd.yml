name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 【关键】安装 Python（解决权限问题，给 aqtinstall 提供正常环境）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 2. 安装 Qt 5.15.2（修正架构参数，升级工具版本）
      - name: Install Qt
        uses: jurplel/install-qt-action@v4  # 升级到 v4，修复兼容性问题
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64  # 修正为正确的架构格式
          modules: qtbase  # 明确指定核心模块，减少解析错误
          py7zr: true  # 启用 py7zr 解压，提升兼容性

      # 3. 配置 CMake
      - name: Configure CMake
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      # 4. 编译项目
      - name: Build project
        run: cmake --build build --config Release

      # 调试：列出 build 目录文件
      - name: List build directory
        run: dir build\Release\

      # 上传 exe 产物
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: SmartTranslator-Windows
          path: build/Release/
          retention-days: 30
