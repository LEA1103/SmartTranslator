# 这是你的 GitHub Actions 工作流（无 Python 版本）
name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest  # 你的运行环境
    steps:
      # 1. 拉取代码（必须保留）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Qt（你项目的核心依赖，保留）
      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: 5.15.2
          host: windows
          target: desktop

      # 3. CMake 配置（保留）
      - name: Configure CMake
        run: cmake -B build -S .

      # 4. 编译项目（保留，按需添加）
      - name: Build
        run: cmake --build build --config Release
