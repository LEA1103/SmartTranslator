name: Minimal CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

env:
  BUILD_TYPE: Release
  QT_VERSION: "5.15.2"

jobs:
  build-windows:
    name: Build & Test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install qt5:x64-windows
          .\vcpkg\vcpkg install tesseract:x64-windows
          .\vcpkg\vcpkg install curl:x64-windows
          .\vcpkg\vcpkg install yaml-cpp:x64-windows
          .\vcpkg\vcpkg install sqlite3:x64-windows
          .\vcpkg\vcpkg install gtest:x64-windows
      - name: Debug - list vcpkg installed packages
        run: .\vcpkg\vcpkg list
      - name: Debug - check Qt path existence
        run: |
          if (Test-Path "C:\Qt\${{ env.QT_VERSION }}\msvc2019_64\lib\cmake\Qt5") {
          Write-Host "Qt5 CMake config found"
          } else {
          Write-Host "Qt5 CMake config NOT found"
          }
      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DCMAKE_PREFIX_PATH="C:\Qt\${{ env.QT_VERSION }}\msvc2019_64"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Upload build artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: smart-translator-windows
          path: build/bin/Release/smart-translator.exe
          retention-days: 7
