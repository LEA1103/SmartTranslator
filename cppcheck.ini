[cppcheck]
# 检查级别：开启所有检查 + 启用不确定但有风险的项
enable=all
inconclusive
inline-suppr

# 扫描目录
include=include
src=src
tests=tests

# 排除目录（不检查）
exclude=build/
exclude=third_party/
exclude=vcpkg/
exclude=.github/

# 屏蔽不需要的警告（适配 Qt / C++ 项目）
suppress=unusedFunction
suppress=missingIncludeSystem
suppress=missingOverride
suppress=functionStatic
suppress=noExplicitConstructor

# 输出格式（给 CI 使用）
xml
xml-version=2
jobs=4

# 发现错误时返回错误码（让 CI 失败）
error-exitcode=1
